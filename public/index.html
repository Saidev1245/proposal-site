<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivika ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:#000;color:white;overflow:hidden}

.page1,.final-screen{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}

.title{font-family:'Cinzel',serif;font-size:3rem}
.btn{margin-top:30px;padding:14px 28px;border-radius:50px;border:none;background:white;color:black;cursor:pointer}

.page2{
  display:none;
  height:100vh;
  width:100%;
  background:url('image.jpg') center/cover;
  filter:brightness(1.2) saturate(1.2);
  position:relative;
}

.page2::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle, rgba(255,255,255,0.15), transparent);
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
}

.line{opacity:0;transition:1s;margin:15px 0}
.show{opacity:1}

.love{font-size:2.5rem;color:#ff2d55;font-family:'Cinzel'}
.final{font-size:1.8rem}

button{padding:12px 24px;margin:10px;border-radius:30px;border:none;cursor:pointer}
.yes{background:#ff2d55;color:white}
.no{background:white;color:black}

canvas{position:fixed;top:0;left:0;pointer-events:none}

.final-screen{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:#000;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:2rem;
}
</style>
</head>
<body>

<div class="page1">
  <h1 class="title">This Is Not Just A Page… It’s My Heart ❤️</h1>
  <button class="btn" onclick="startJourney()">Begin</button>
</div>

<div class="page2" id="page2">
  <div class="overlay"></div>

  <div class="content">
    <p class="line" id="text"></p>

    <h1 class="love line">I LOVE YOU ❤️</h1>
    <h2 class="final line">WILL YOU MARRY ME ON 7-7-2032 💍</h2>

    <div class="line">
      <button class="yes" onclick="sayYes()">YES 💖</button>
      <button class="no" onclick="stopMusic()">NO 😢</button>
    </div>
  </div>
</div>

<div class="final-screen" id="finalScreen">💖 Forever starts now 💖</div>

<canvas id="fireworks"></canvas>
<audio id="music" src="music.mp3" loop></audio>

<script>
const message = `From the moment you entered my life, everything changed in the most beautiful way.\nYou became my happiness.\nYou are my forever.`;

function startJourney(){
  document.querySelector('.page1').style.display='none';
  document.querySelector('.page2').style.display='block';
  document.getElementById('music').play().catch(()=>{});
  typeEffect();
  showLines();
}

function typeEffect(){
  let i=0;
  const speed=30;
  function type(){
    if(i<message.length){
      document.getElementById('text').innerHTML += message.charAt(i);
      i++;
      setTimeout(type,speed);
    }
  }
  type();
}

function showLines(){
  const lines=document.querySelectorAll('.line');
  lines.forEach((el,i)=>{
    setTimeout(()=>el.classList.add('show'), i*1000);
  });
}

function stopMusic(){document.getElementById('music').pause();}

// Fireworks
const canvas=document.getElementById('fireworks');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;
let particles=[];

function createFirework(){
  for(let i=0;i<100;i++){
    particles.push({x:canvas.width/2,y:canvas.height/2,dx:(Math.random()-0.5)*8,dy:(Math.random()-0.5)*8,life:100});
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;p.y+=p.dy;p.life--;
    ctx.fillRect(p.x,p.y,2,2);
  });
  particles=particles.filter(p=>p.life>0);
  requestAnimationFrame(animate);
}
animate();

async function sayYes(){
  createFirework();
  stopMusic();
  await fetch('/yes',{method:'POST'});
  document.querySelector('.page2').style.display='none';
  document.getElementById('finalScreen').style.display='flex';
}
</script>

</body>
</html>
